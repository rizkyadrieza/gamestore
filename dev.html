<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Mode - GameStore</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0f;
            color: #00ff00;
            padding: 20px;
        }
        
        .dev-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .dev-header {
            background: #1a1a2a;
            padding: 20px;
            border: 2px solid #00ff00;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .dev-title {
            font-size: 24px;
            text-shadow: 0 0 10px #00ff00;
        }
        
        .logout-btn {
            padding: 10px 20px;
            background: #ff0000;
            color: #fff;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        
        .dev-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .panel-box {
            background: rgba(20, 20, 30, 0.9);
            border: 1px solid #00ff00;
            padding: 20px;
            border-radius: 10px;
        }
        
        .panel-box h3 {
            color: #00ffff;
            margin-bottom: 20px;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 10px;
        }
        
        input, textarea, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #0a0a0f;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: 'Courier New', monospace;
        }
        
        button {
            background: #00ff00;
            color: #0a0a0f;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #00ffff;
            box-shadow: 0 0 20px #00ff00;
        }
        
        .game-list-item, .review-list-item {
            background: rgba(0, 255, 0, 0.05);
            padding: 10px;
            margin: 10px 0;
            border-left: 3px solid #00ff00;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .delete-btn {
            background: #ff0000;
            color: #fff;
            padding: 5px 15px;
            width: auto;
            border: none;
        }
        
        #imagePreview {
            max-width: 200px;
            margin: 10px auto;
            display: none;
            border: 1px solid #00ff00;
            border-radius: 5px;
        }
        
        .upload-status {
            color: #ffff00;
            font-size: 12px;
            margin: 5px 0;
        }
        
        @media (max-width: 768px) {
            .dev-panel { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="dev-container">
        <div class="dev-header">
            <h1 class="dev-title">🎮 DEV MODE</h1>
            <button class="logout-btn" onclick="logout()">LOGOUT</button>
        </div>
        
        <div class="dev-panel">
            <!-- ADD GAME PANEL -->
            <div class="panel-box">
                <h3>➕ ADD NEW GAME</h3>
                <input type="text" id="gameTitle" placeholder="Game Title">
                <input type="number" id="gamePrice" placeholder="Price (Rupiah)">
                <input type="file" id="gameImage" accept="image/*">
                <img id="imagePreview" alt="Preview">
                <button id="addGameBtn" onclick="addGame()">📤 PUBLISH GAME</button>
                <p id="uploadStatus" class="upload-status"></p>
            </div>
            
            <!-- MANAGE GAMES PANEL -->
            <div class="panel-box">
                <h3>📋 MANAGE GAMES</h3>
                <div id="gameList"></div>
            </div>
            
            <!-- MANAGE REVIEWS PANEL -->
            <div class="panel-box" style="grid-column: span 2;">
                <h3>💬 MANAGE REVIEWS</h3>
                <div id="reviewList"></div>
            </div>
        </div>
    </div>

    <script>
        // ========== FIREBASE CONFIG ==========
        const firebaseConfig = {
            apiKey: "AIzaSyDsshK8QGBxWZjXb1gpX9KsjyeZZopqQFQ",
            authDomain: "gamestore-ee3ce.firebaseapp.com",
            projectId: "gamestore-ee3ce",
            storageBucket: "gamestore-ee3ce.firebasestorage.app",
            messagingSenderId: "978012422724",
            appId: "1:978012422724:web:55a25b657e3fc7478bb211"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ========== CLOUDINARY CONFIG ==========
        const CLOUD_NAME = "dm2qtb3ft";
        const UPLOAD_PRESET = "game_upload";

        // ========== PASSWORD ==========
        const DEV_PASSWORD = "admin123";

        // ========== AUTH CHECK ==========
        if (!sessionStorage.getItem('devAuth')) {
            const password = prompt('Masukkan Password Developer:');
            if (password !== DEV_PASSWORD) {
                alert('Akses Ditolak! Password salah.');
                window.location.href = 'index.html';
            } else {
                sessionStorage.setItem('devAuth', 'true');
            }
        }

        // ========== IMAGE PREVIEW ==========
        document.getElementById('gameImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('imagePreview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // ========== ADD GAME ==========
        async function addGame() {
            const title = document.getElementById('gameTitle').value.trim();
            const price = document.getElementById('gamePrice').value;
            const imageFile = document.getElementById('gameImage').files[0];
            const statusEl = document.getElementById('uploadStatus');
            const btn = document.getElementById('addGameBtn');
            
            if (!title || !price || !imageFile) {
                alert('Harap isi semua field! (Judul, Harga, Gambar)');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '⏳ Uploading...';
            statusEl.textContent = 'Mengupload gambar ke Cloudinary...';
            
            try {
                const formData = new FormData();
                formData.append('file', imageFile);
                formData.append('upload_preset', UPLOAD_PRESET);
                formData.append('folder', 'game-covers');
                
                const response = await fetch(
                    `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
                    { method: 'POST', body: formData }
                );
                
                const data = await response.json();
                
                if (data.secure_url) {
                    statusEl.textContent = 'Menyimpan ke database...';
                    
                    await db.collection('games').add({
                        title: title,
                        price: price,
                        imageUrl: data.secure_url,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    alert('✅ Game berhasil dipublikasikan!');
                    clearForm();
                    loadGamesList();
                } else {
                    alert('❌ Upload gagal. Periksa Cloud Name & Upload Preset.');
                    console.error(data);
                }
            } catch (error) {
                console.error("Error:", error);
                alert('❌ Gagal menambahkan game. Cek koneksi internet.');
            } finally {
                btn.disabled = false;
                btn.textContent = '📤 PUBLISH GAME';
                statusEl.textContent = '';
            }
        }

        function clearForm() {
            document.getElementById('gameTitle').value = '';
            document.getElementById('gamePrice').value = '';
            document.getElementById('gameImage').value = '';
            document.getElementById('imagePreview').style.display = 'none';
        }

        // ========== LOAD GAMES LIST ==========
        function loadGamesList() {
            const container = document.getElementById('gameList');
            container.innerHTML = '<p style="color:#666">Loading...</p>';
            
            db.collection('games').orderBy('createdAt', 'desc').get()
                .then((snapshot) => {
                    if (snapshot.empty) {
                        container.innerHTML = '<p style="color:#666">Belum ada game.</p>';
                        return;
                    }
                    container.innerHTML = '';
                    snapshot.forEach((doc) => {
                        const game = doc.data();
                        const div = document.createElement('div');
                        div.className = 'game-list-item';
                        div.innerHTML = `
                            <div>
                                <strong>${game.title}</strong><br>
                                <small>Rp ${parseInt(game.price).toLocaleString('id-ID')}</small>
                            </div>
                            <button class="delete-btn" onclick="deleteGame('${doc.id}')">🗑️ HAPUS</button>
                        `;
                        container.appendChild(div);
                    });
                })
                .catch((error) => {
                    console.error(error);
                    container.innerHTML = '<p style="color:red">Gagal memuat game.</p>';
                });
        }

        // ========== DELETE GAME ==========
        async function deleteGame(gameId) {
            if (confirm('Yakin ingin menghapus game ini?')) {
                try {
                    await db.collection('games').doc(gameId).delete();
                    alert('✅ Game dihapus!');
                    loadGamesList();
                } catch (error) {
                    alert('❌ Gagal menghapus game.');
                }
            }
        }

        // ========== LOAD REVIEWS LIST ==========
        function loadReviewsList() {
            const container = document.getElementById('reviewList');
            container.innerHTML = '<p style="color:#666">Loading...</p>';
            
            db.collection('reviews').orderBy('createdAt', 'desc').get()
                .then((snapshot) => {
                    if (snapshot.empty) {
                        container.innerHTML = '<p style="color:#666">Belum ada review.</p>';
                        return;
                    }
                    container.innerHTML = '';
                    snapshot.forEach((doc) => {
                        const review = doc.data();
                        const date = review.createdAt ? 
                            new Date(review.createdAt.toDate()).toLocaleDateString('id-ID') : 
                            'Unknown';
                        const div = document.createElement('div');
                        div.className = 'review-list-item';
                        div.innerHTML = `
                            <div>
                                <strong>${review.name || 'Anonymous'}</strong> 
                                ${'⭐'.repeat(review.rating || 0)}
                                <br><small>"${review.text}"</small>
                                <br><small style="color:#666">${date}</small>
                            </div>
                            <button class="delete-btn" onclick="deleteReview('${doc.id}')">🗑️ HAPUS</button>
                        `;
                        container.appendChild(div);
                    });
                })
                .catch((error) => {
                    console.error(error);
                    container.innerHTML = '<p style="color:red">Gagal memuat review.</p>';
                });
        }

        // ========== DELETE REVIEW ==========
        async function deleteReview(reviewId) {
            if (confirm('Yakin ingin menghapus review ini?')) {
                try {
                    await db.collection('reviews').doc(reviewId).delete();
                    alert('✅ Review dihapus!');
                    loadReviewsList();
                } catch (error) {
                    alert('❌ Gagal menghapus review.');
                }
            }
        }

        // ========== LOGOUT ==========
        function logout() {
            sessionStorage.removeItem('devAuth');
            window.location.href = 'index.html';
        }

        // ========== INIT ==========
        loadGamesList();
        loadReviewsList();
    </script>
</body>
</html>
